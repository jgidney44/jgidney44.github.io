<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{ page.title }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }
    header {
      padding: 1rem;
      background: #111;
      color: white;
    }
    header a {
      color: white;
      text-decoration: none;
      font-weight: bold;
    }
    .container {
      max-width: 1000px;
      margin: 2rem auto;
      padding: 0 1rem;
    }
    iframe {
      width: 100%;
      height: 90vh;
      border: none;
    }
  </style>
</head>
<body>

<header>
  <a href="{{ '/' | relative_url }}">{{ site.title }}</a>
</header>

<div class="container">
  <h1>{{ page.title }}</h1>
  <iframe src="{{ page.pdf }}"></iframe>
</div>

</body>
</html>
